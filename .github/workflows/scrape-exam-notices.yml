name: Scrape Examination Notices

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  scrape-notices:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Scrape examination notices
      run: npm run scrape:notices
      env:
        NODE_ENV: production
        
    - name: Check for changes
      id: check_changes
      run: |
        if git diff --quiet public/exam-notices.json; then
          echo "No changes detected"
          echo "changes=false" >> $GITHUB_OUTPUT
        else
          # Check if only the lastUpdated field changed
          OLD_CONTENT=$(git show HEAD:public/exam-notices.json 2>/dev/null || echo "{}")
          OLD_DATA=$(echo "$OLD_CONTENT" | jq -c 'del(.lastUpdated)')
          NEW_DATA=$(jq -c 'del(.lastUpdated)' public/exam-notices.json)
          
          if [ "$OLD_DATA" = "$NEW_DATA" ]; then
            echo "Only timestamp changed. Reverting file to avoid commit."
            git checkout public/exam-notices.json
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "Actual data changes detected"
            echo "changes=true" >> $GITHUB_OUTPUT
          fi
        fi
        
    - name: Commit and push changes
      if: steps.check_changes.outputs.changes == 'true'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add public/exam-notices.json
        git commit -m "Update examination notices - $(date -u +"%Y-%m-%d %H:%M:%S UTC")" || exit 0
        git push || exit 0
        
    - name: Summary
      run: |
        if [ -f public/exam-notices.json ]; then
          echo "Examination notices update completed!"
          echo "Total notices: $(jq '.total' public/exam-notices.json)"
          echo "Last updated: $(jq -r '.lastUpdated' public/exam-notices.json)"
        else
          echo "No notices file found"
        fi
